name: Tauri CI

on:
  pull_request:
  push:
    branches: [main, master]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tauri-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            container: ubuntu:20.04
            artifact-suffix: linux
            build-command: npm run tauri:build:linux
          - name: macOS
            os: macos-latest
            artifact-suffix: macos
            build-command: npm run tauri:build:macos
          - name: Windows
            os: windows-latest
            artifact-suffix: windows
            build-command: npm run tauri:build:windows

    steps:
      - name: Install container prerequisites (Linux container only)
        if: runner.os == 'Linux'
        run: |
          apt-get update
          apt-get install -y sudo git curl tar gzip ca-certificates build-essential
          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: bash scripts/install-tauri-linux-deps.sh

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Use Rust stable
        run: rustup default stable

      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Alias python3 on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pythonPath = (Get-Command python).Source
          $pythonDir = Split-Path $pythonPath
          Copy-Item $pythonPath (Join-Path $pythonDir "python3.exe") -ErrorAction SilentlyContinue

      - name: Install npm dependencies
        run: npm ci

      - name: Verify localization coverage
        run: npm run test:i18n

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri bundle
        run: ${{ matrix.build-command }}

      - name: Upload bundle artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-desktop-tauri-${{ matrix.artifact-suffix }}-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload bundle artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-desktop-tauri-${{ matrix.artifact-suffix }}-${{ github.sha }}
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload bundle artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-desktop-tauri-${{ matrix.artifact-suffix }}-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: hermes-desktop-tauri-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
